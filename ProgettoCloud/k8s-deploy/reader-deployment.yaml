apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-reader
spec:
  replicas: 2 
    selector:
    matchLabels:
      app: reader
  template:
    metadata:
      labels:
        app: reader
    spec:
      containers:
      - name: reader
        image: api-reader:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 5000
        env:
        - name: REDIS_HOST
          value: "redis-0.redis-service"

apiVersion: v1
kind: Service
metadata:
  name: reader-service
spec:
  type: LoadBalancer 
  ports:
  - port: 80
    targetPort: 5000
  selector:
    app: reader